# Static site — no build step. Upload everything in this folder.
#
# Custom domain: rajasekhar.cloud (configure DNS at GoDaddy to match Netlify’s UI).
# Typical external DNS at registrar:
#   A     @     → 75.2.60.5
#   CNAME www   → rajasekhar-cloud.netlify.app
# (Confirm A + CNAME targets in Netlify → Domain management → DNS configuration.)

[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
